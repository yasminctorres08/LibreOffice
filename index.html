<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluación LibreOffice - Drive Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        i[data-lucide] svg { display: inline-block; }
        .loader { border-top-color: #4f46e5; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // --- PEGA AQUÍ TU URL DE GOOGLE APPS SCRIPT ---
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyQRzlM7FoJ89-_B4CtJZsPT0eGdd9OR5dt4kLKJfLUBCJMNOYmlji4ufPaHVfJCfPM/exec"; 

        const Icon = ({ name, className }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = '';
                    const i = document.createElement('i');
                    i.setAttribute('data-lucide', name);
                    i.className = className;
                    iconRef.current.appendChild(i);
                    window.lucide.createIcons();
                }
            }, [name, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
        };

        const questions = [
            { id: 1, app: 'Writer', text: 'Para aplicar un estilo de título a un texto en Writer, es obligatorio seleccionar todo el párrafo primero.', answer: false, explanation: 'Falso. Solo necesitas colocar el cursor en el párrafo.', icon: "file-text", color: "text-blue-500" },
            { id: 2, app: 'Writer', text: 'El atajo de teclado Ctrl + Enter inserta un salto de página manual en LibreOffice Writer.', answer: true, explanation: 'Verdadero. Es la forma rápida de forzar una nueva página.', icon: "file-text", color: "text-blue-500" },
            { id: 3, app: 'Writer', text: 'La función "Clonar formato" permite aplicar el formato múltiples veces con doble clic.', answer: true, explanation: 'Verdadero. El doble clic bloquea la herramienta.', icon: "file-text", color: "text-blue-500" },
            { id: 4, app: 'Calc', text: 'En LibreOffice Calc, todas las fórmulas deben comenzar con el signo igual (=).', answer: true, explanation: 'Verdadero. Indica que el contenido es una operación.', icon: "monitor", color: "text-green-500" },
            { id: 5, app: 'Calc', text: 'Si eliminas una fila referenciada, Calc mostrará el error #REF!.', answer: true, explanation: 'Verdadero. Se pierde la referencia directa.', icon: "monitor", color: "text-green-500" },
            { id: 6, app: 'Calc', text: 'La herramienta "Filtro automático" oculta filas pero no elimina datos.', answer: true, explanation: 'Verdadero. Es solo visualización.', icon: "monitor", color: "text-green-500" },
            { id: 7, app: 'Impress', text: 'El "Patrón de diapositivas" aplica un diseño consistente a todas las diapositivas.', answer: true, explanation: 'Verdadero. Controla el formato general.', icon: "presentation", color: "text-orange-500" },
            { id: 8, app: 'Impress', text: 'Las "Transiciones" son efectos entre diapositivas.', answer: false, explanation: 'Falso. Las transiciones son entre diapositivas, no dentro.', icon: "presentation", color: "text-orange-500" },
            { id: 9, app: 'Impress', text: 'Es posible exportar a PDF de forma nativa en Impress.', answer: true, explanation: 'Verdadero. LibreOffice lo incluye por defecto.', icon: "presentation", color: "text-orange-500" },
            { id: 10, app: 'General', text: 'LibreOffice permite guardar en formatos compatibles con Microsoft Office.', answer: true, explanation: 'Verdadero. Soporta .docx, .xlsx, etc.', icon: "settings", color: "text-gray-500" }
        ];

        function App() {
            const [appState, setAppState] = useState('start'); // start, playing, finished, sending, exit
            const [userName, setUserName] = useState('');
            const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [isAnswerSubmitted, setIsAnswerSubmitted] = useState(false);
            const [results, setResults] = useState([]);

            const handleStart = (e) => {
                e.preventDefault();
                if (userName.trim()) setAppState('playing');
            };

            const handleAnswer = (answer) => {
                if (isAnswerSubmitted) return;
                const correct = answer === questions[currentQuestionIndex].answer;
                setSelectedAnswer(answer);
                setIsAnswerSubmitted(true);
                if (correct) setScore(s => s + 1);
                
                setResults([...results, {
                    pregunta: questions[currentQuestionIndex].text,
                    correcta: correct
                }]);
            };

            const handleNext = () => {
                if (currentQuestionIndex < questions.length - 1) {
                    setCurrentQuestionIndex(i => i + 1);
                    setSelectedAnswer(null);
                    setIsAnswerSubmitted(false);
                } else {
                    setAppState('finished');
                }
            };

            const sendToDrive = async () => {
                setAppState('sending');
                const percentage = Math.round((score / questions.length) * 100);
                
                const payload = {
                    nombre: userName,
                    puntaje: score,
                    porcentaje: percentage,
                    respuestas: results
                };

                try {
                    // Usamos fetch con mode 'no-cors' para Apps Script
                    await fetch(WEB_APP_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        cache: 'no-cache',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    setAppState('exit');
                } catch (error) {
                    console.error("Error:", error);
                    // Incluso si da error de CORS, el dato suele llegar a Google Sheets
                    setAppState('exit'); 
                }
            };

            if (appState === 'exit') {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-white p-6">
                        <div className="text-center max-w-sm">
                            <div className="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
                                <Icon name="check-circle" className="w-12 h-12" />
                            </div>
                            <h2 className="text-2xl font-bold text-gray-800 mb-2">¡Datos Registrados!</h2>
                            <p className="text-gray-600 mb-8">Tus respuestas han sido enviadas directamente a la hoja de cálculo del instructor.</p>
                            <p className="text-xs text-gray-400 uppercase tracking-widest font-bold italic">Puedes cerrar esta ventana</p>
                        </div>
                    </div>
                );
            }

            if (appState === 'sending') {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-white p-6">
                        <div className="text-center">
                            <div className="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4 mx-auto"></div>
                            <h2 className="text-xl font-semibold text-gray-700">Enviando a Google Drive...</h2>
                        </div>
                    </div>
                );
            }

            if (appState === 'start') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="max-w-md w-full bg-white rounded-3xl shadow-2xl overflow-hidden">
                            <div className="bg-indigo-600 p-8 text-white text-center">
                                <Icon name="cloud" className="w-16 h-16 mb-4" />
                                <h1 className="text-2xl font-bold uppercase">Registro Automático</h1>
                                <p className="opacity-75 text-sm">Los resultados se guardarán en Drive</p>
                            </div>
                            <form onSubmit={handleStart} className="p-8">
                                <label className="block text-gray-700 text-sm font-bold mb-2">Tu Nombre:</label>
                                <input 
                                    required 
                                    className="w-full p-4 border-2 rounded-xl mb-6 outline-none focus:border-indigo-500" 
                                    value={userName} 
                                    onChange={e => setUserName(e.target.value)}
                                    placeholder="Nombre y Apellido"
                                />
                                <button className="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl hover:bg-indigo-700 transition-all shadow-lg">
                                    EMPEZAR EVALUACIÓN
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            if (appState === 'finished') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="max-w-md w-full bg-white rounded-3xl shadow-2xl p-10 text-center border-t-8 border-indigo-600">
                            <h2 className="text-gray-400 font-bold uppercase tracking-widest mb-2">Resultados para</h2>
                            <h1 className="text-3xl font-black text-gray-800 mb-6">{userName}</h1>
                            <div className="bg-indigo-50 rounded-3xl py-10 mb-8 border border-indigo-100">
                                <div className="text-7xl font-black text-indigo-600">{score}</div>
                                <div className="text-indigo-300 font-bold uppercase">puntos de {questions.length}</div>
                            </div>
                            <button onClick={sendToDrive} className="w-full bg-indigo-600 text-white font-bold py-5 rounded-2xl flex items-center justify-center space-x-3 shadow-xl hover:bg-indigo-700">
                                <Icon name="upload-cloud" className="w-6 h-6" />
                                <span>GUARDAR EN DRIVE Y SALIR</span>
                            </button>
                        </div>
                    </div>
                );
            }

            const q = questions[currentQuestionIndex];
            const isCorrect = isAnswerSubmitted && selectedAnswer === q.answer;

            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-4">
                    <div className="max-w-2xl w-full">
                        <div className="mb-4 flex justify-between px-2 text-xs font-bold text-gray-400">
                            <span>PREGUNTA {currentQuestionIndex + 1} DE {questions.length}</span>
                            <span>MÓDULO: {q.app}</span>
                        </div>
                        <div className="bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
                            <div className="p-8 sm:p-12">
                                <div className={`w-16 h-16 rounded-2xl flex items-center justify-center mb-6 bg-slate-50 ${q.color}`}>
                                    <Icon name={q.icon} className="w-8 h-8" />
                                </div>
                                <h2 className="text-2xl font-bold text-gray-800 leading-tight mb-10">{q.text}</h2>
                                <div className="grid grid-cols-2 gap-4">
                                    <button 
                                        disabled={isAnswerSubmitted}
                                        onClick={() => handleAnswer(true)}
                                        className={`py-5 rounded-2xl border-2 font-bold transition-all ${!isAnswerSubmitted ? 'border-gray-100 hover:border-indigo-600' : selectedAnswer === true ? (q.answer === true ? 'bg-green-500 border-green-500 text-white' : 'bg-red-500 border-red-500 text-white') : (q.answer === true ? 'border-green-200 text-green-200' : 'opacity-20')}`}
                                    >Verdadero</button>
                                    <button 
                                        disabled={isAnswerSubmitted}
                                        onClick={() => handleAnswer(false)}
                                        className={`py-5 rounded-2xl border-2 font-bold transition-all ${!isAnswerSubmitted ? 'border-gray-100 hover:border-indigo-600' : selectedAnswer === false ? (q.answer === false ? 'bg-green-500 border-green-500 text-white' : 'bg-red-500 border-red-500 text-white') : (q.answer === false ? 'border-green-200 text-green-200' : 'opacity-20')}`}
                                    >Falso</button>
                                </div>
                            </div>
                            {isAnswerSubmitted && (
                                <div className={`p-8 border-t-4 ${isCorrect ? 'bg-green-50 border-green-500' : 'bg-red-50 border-red-500'}`}>
                                    <p className="font-medium text-gray-700 mb-6 italic">{q.explanation}</p>
                                    <button onClick={handleNext} className="w-full bg-gray-800 text-white py-4 rounded-xl font-bold flex items-center justify-center space-x-2">
                                        <span>Continuar</span>
                                        <Icon name="chevron-right" className="w-5 h-5" />
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
